    <!-- Ventana Modal para Agrandar Fotos con Flechas -->
    <div id="modal-visor" class="modal">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        
        <!-- Flechas de navegación -->
        <span class="flecha izquierda" onclick="cambiarFoto(-1)">&#10094;</span>
        <span class="flecha derecha" onclick="cambiarFoto(1)">&#10095;</span>
        
        <!-- El contenedor cierra el modal si haces click fuera de la foto -->
        <div class="modal-bg" onclick="cerrarModal()"></div>

    </div>
